<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetMonitor — Вход</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #1e1e2e;
    font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
}
.login-box {
    background: #2d2d3f;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 400px;
    text-align: center;
}
.login-box h1 {
    color: #cdd6f4;
    margin: 0 0 8px 0;
    font-size: 24px;
}
.login-box p.subtitle {
    color: #6c7086;
    margin: 0 0 24px 0;
    font-size: 14px;
}
.login-box input {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 16px;
    border: 1px solid #45475a;
    border-radius: 8px;
    background: #38384d;
    color: #cdd6f4;
    font-size: 16px;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s;
}
.login-box input:focus {
    border-color: #89b4fa;
}
.login-box button {
    width: 100%;
    padding: 12px;
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
}
.login-box button:hover {
    background: #74c7ec;
}
.login-box .error {
    color: #f38ba8;
    margin-top: 16px;
    font-size: 14px;
    min-height: 20px;
}
.login-box .spinner {
    display: none;
    width: 24px;
    height: 24px;
    border: 3px solid #45475a;
    border-top-color: #89b4fa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 16px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-box">
    <h1>🔒 NetMonitor</h1>
    <p class="subtitle">Войдите для доступа к мониторингу</p>
    <form id="loginForm" autocomplete="off">
        <input type="text" id="username" placeholder="Имя пользователя" required autofocus>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
        <div class="error" id="errorMsg"></div>
        <div class="spinner" id="spinner"></div>
    </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const error = document.getElementById('errorMsg');
    const spinner = document.getElementById('spinner');
    const btn = document.querySelector('button');
    
    error.textContent = '';
    btn.disabled = true;
    spinner.style.display = 'block';
    
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (res.ok && data.access_token) {
            localStorage.setItem('netmon_token', data.access_token);
            window.location.href = '/index.html';
        } else {
            error.textContent = data.detail || 'Неверное имя пользователя или пароль';
        }
    } catch (err) {
        error.textContent = 'Ошибка соединения с сервером';
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
});
</script>
</body>
</html>
